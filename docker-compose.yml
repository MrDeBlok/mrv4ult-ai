services:
  evolution-api:
    container_name: mrv4ult_evolution_api
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data/evolution/instances:/evolution/instances

  postgres:
    container_name: mrv4ult_evolution_postgres
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-evolution}
      POSTGRES_USER: ${POSTGRES_USERNAME:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USERNAME:-evolution} -d ${POSTGRES_DATABASE:-evolution}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  evolution_postgres_data:
