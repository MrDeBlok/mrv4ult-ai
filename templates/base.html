<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MRV4ULT AI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='css/dashboard.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="/">MRV4ULT AI</a>
            <div class="navbar-nav flex-row gap-3 ms-auto">
                <a class="nav-link{% if request.url.path == '/' %} active{% endif %}" href="/">Search</a>
                <a class="nav-link{% if request.url.path == '/import' %} active{% endif %}" href="/import">Import</a>
                <a class="nav-link{% if request.url.path.startswith('/requests') %} active{% endif %}" href="/requests">Requests</a>
                <a class="nav-link{% if request.url.path.startswith('/dealers') %} active{% endif %}" href="/dealers">Dealers</a>
                <a class="nav-link position-relative{% if request.url.path.startswith('/notifications') %} active{% endif %}" href="/notifications">
                    Notifications
                    {% set notification_count = unread_notification_count() %}
                    {% if notification_count %}
                    <span class="badge rounded-pill text-bg-danger notification-nav-badge">{{ notification_count }}</span>
                    {% endif %}
                </a>
                <a class="nav-link{% if request.url.path.startswith('/activity') %} active{% endif %}" href="/activity">Activity</a>
                <a class="nav-link{% if request.url.path.startswith('/whatsapp') %} active{% endif %}" href="/whatsapp">WhatsApp</a>
            </div>
        </div>
    </nav>

    <main class="container pb-5">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
