{% extends "base.html" %}

{% block title %}Edit request · MRV4ULT AI{% endblock %}

{% block content %}
<section class="card shadow-sm mb-4">
    <div class="card-body p-3 p-md-4">
        <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-3">
            <div>
                <h1 class="h3 mb-1">Edit client request</h1>
                <p class="text-muted mb-0">Update wanted watch details for {{ form.client_name or "this client" }}.</p>
            </div>
            <a href="/requests" class="btn btn-sm btn-outline-secondary">Back to requests</a>
        </div>

        {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/requests/{{ form.id }}/edit" class="row g-3">
            <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="client-name">Client name</label>
                <input type="text" class="form-control" id="client-name" name="client_name" value="{{ form.client_name }}" required>
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="brand">Brand</label>
                <input type="text" class="form-control" id="brand" name="brand" value="{{ form.brand }}">
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="reference">Reference</label>
                <input type="text" class="form-control" id="reference" name="reference" value="{{ form.reference }}">
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="model">Model</label>
                <input type="text" class="form-control" id="model" name="model" value="{{ form.model }}">
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="alias">Alias / nickname</label>
                <input type="text" class="form-control" id="alias" name="alias" value="{{ form.alias }}">
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="dial">Dial</label>
                <input type="text" class="form-control" id="dial" name="dial" value="{{ form.dial }}">
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="condition">Condition</label>
                <select class="form-select" id="condition" name="condition">
                    {% for value, label in request_condition_options %}
                    <option value="{{ value }}" {% if form.condition == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="min-year">Min year</label>
                <input type="number" class="form-control" id="min-year" name="min_year" min="1900" max="2100" value="{{ form.min_year }}">
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="max-year">Max year</label>
                <input type="number" class="form-control" id="max-year" name="max_year" min="1900" max="2100" value="{{ form.max_year }}">
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="max-price">Max price</label>
                <input type="number" class="form-control" id="max-price" name="max_price" min="0" value="{{ form.max_price }}">
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="currency">Currency</label>
                <select class="form-select" id="currency" name="currency">
                    {% for code in ["USD", "EUR", "HKD", "CHF", "GBP"] %}
                    <option value="{{ code }}" {% if form.currency == code %}selected{% endif %}>{{ code }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="status">Status</label>
                <select class="form-select" id="status" name="status">
                    <option value="open" {% if form.status == 'open' %}selected{% endif %}>Open</option>
                    <option value="matched" {% if form.status == 'matched' %}selected{% endif %}>Matched</option>
                    <option value="closed" {% if form.status == 'closed' %}selected{% endif %}>Closed</option>
                </select>
            </div>
            <div class="col-12">
                <label class="form-label fw-semibold" for="notes">Notes</label>
                <textarea class="form-control" id="notes" name="notes" rows="3">{{ form.notes }}</textarea>
            </div>
            <div class="col-12 d-flex flex-wrap gap-2">
                <button type="submit" class="btn btn-primary">Save changes</button>
                <a href="/requests" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
