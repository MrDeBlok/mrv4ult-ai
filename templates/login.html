{% extends "base.html" %}

{% block title %}Login · MRV4ULT AI{% endblock %}

{% block content %}
<section class="card shadow-sm mx-auto" style="max-width: 420px;">
    <div class="card-body p-4">
        <h1 class="h3 mb-2">Sign in</h1>
        <p class="text-muted mb-4">Internal pilot login. Enter your team email to continue.</p>

        {% if error %}
        <div class="alert alert-danger" role="alert">Unknown email. Ask an admin for access.</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    required
                    autocomplete="username"
                    placeholder="trader1@mrvault.local"
                >
            </div>
            <button type="submit" class="btn btn-primary w-100">Continue</button>
        </form>
    </div>
</section>
{% endblock %}
